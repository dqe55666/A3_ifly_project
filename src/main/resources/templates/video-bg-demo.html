<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>全屏视频背景 - Project A3 iFly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 全屏视频容器 */
        .video-background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background-container video {
            /* 视频最小尺寸 */
            min-width: 100%;
            min-height: 100%;

            /* 居中定位 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            /* 保持比例 */
            object-fit: cover;
        }

        /* 视频遮罩层 */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* 内容区域 */
        .content-wrapper {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .content-wrapper h1 {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            margin-bottom: 1rem;
        }

        .content-wrapper p {
            font-size: 1.5rem;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .btn-video-demo {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .btn-video-demo:hover {
            background: white;
            color: #333;
        }

        /* 向下滚动提示 */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-20px);
            }
            60% {
                transform: translateY(-10px);
            }
        }

        /* 滚动内容区域 */
        .scroll-section {
            position: relative;
            z-index: 1;
            background: white;
            padding: 80px 0;
            margin-top: 100vh;
        }

        .navbar-transparent {
            background: rgba(0, 0, 0, 0.5) !important;
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-transparent fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">Project A3 iFly</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">返回首页</a>
                <a class="nav-link" href="/parallax">视差滚动</a>
                <a class="nav-link" href="/scroll-transitions">滚动转换</a>
                <a class="nav-link" href="/fullscreen-nav">全屏导航</a>
                <a class="nav-link" href="/shadow-loader">阴影加载</a>
                <a class="nav-link" href="/reverse-hover">反向悬停</a>
                <a class="nav-link" href="/text-align-center">文本居中</a>
            </div>
        </div>
    </nav>

    <!-- 全屏视频背景 -->
    <div class="video-background-container">
        <!-- 使用免费的 CC0 视频源 -->
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4" type="video/mp4">
            您的浏览器不支持视频标签。
        </video>
    </div>

    <!-- 视频遮罩层，用于提高文字可读性 -->
    <div class="video-overlay"></div>

    <!-- 主要内容 -->
    <div class="content-wrapper">
        <h1>沉浸式视觉体验</h1>
        <p>全屏视频背景能够瞬间抓住访客的注意力，为您的网站增添现代感和专业感。</p>
        <div>
            <a href="/register" class="btn btn-video-demo me-3">立即开始</a>
            <a href="/" class="btn btn-outline-light btn-video-demo">了解更多</a>
        </div>
        
        <div class="scroll-down">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-chevron-down" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/>
            </svg>
        </div>
    </div>

    <!-- 滚动后显示的内容 -->
    <div class="scroll-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">
                    <h2 class="mb-4">关于全屏视频背景</h2>
                    <p class="text-muted mb-5">
                        这种设计适合作为首页、产品登录页或活动专题页。它能够在短时间内传达品牌氛围和情绪。
                    </p>
                    
                    <div class="row mt-5">
                        <div class="col-md-4">
                            <div class="card border-0 shadow-sm p-4 h-100">
                                <div class="card-body text-center">
                                    <h3 class="h5 mb-3">性能优化</h3>
                                    <p>我们使用 object-fit: cover 确保视频在任何设备上都能完美适配。</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card border-0 shadow-sm p-4 h-100">
                                <div class="card-body text-center">
                                    <h3 class="h5 mb-3">用户体验</h3>
                                    <p>默认设置为静音和自动播放，并添加了深色遮罩增强文字对比度。</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card border-0 shadow-sm p-4 h-100">
                                <div class="card-body text-center">
                                    <h3 class="h5 mb-3">响应式设计</h3>
                                    <p>无论是在手机、平板还是 PC 上，视频都能完美居中展示。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
