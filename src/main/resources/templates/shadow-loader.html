<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Box Shadow 加载动画效果 - Project A3 iFly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f8f9fa;
        }

        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
            text-align: center;
        }

        .content-section {
            padding: 80px 0;
        }

        .loader-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            height: 100%;
        }

        /* 加载器容器 */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 150px;
        }

        /* 1. 脉冲阴影加载器 */
        .loader-pulse {
            width: 50px;
            height: 50px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse-shadow 1.5s ease-in-out infinite;
        }

        @keyframes pulse-shadow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(102, 126, 234, 0);
                transform: scale(0.95);
            }
        }

        /* 2. 旋转阴影加载器 */
        .loader-rotate {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 10px;
            animation: rotate-shadow 1.5s linear infinite;
        }

        @keyframes rotate-shadow {
            0% {
                transform: rotate(0deg);
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.6), 
                            0 0 40px rgba(118, 75, 162, 0.4);
            }
            50% {
                transform: rotate(180deg);
                box-shadow: 0 0 40px rgba(102, 126, 234, 0.8), 
                            0 0 60px rgba(118, 75, 162, 0.6);
            }
            100% {
                transform: rotate(360deg);
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.6), 
                            0 0 40px rgba(118, 75, 162, 0.4);
            }
        }

        /* 3. 弹跳阴影加载器 */
        .loader-bounce {
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce-shadow 1s ease-in-out infinite;
        }

        @keyframes bounce-shadow {
            0%, 100% {
                transform: translateY(0);
                box-shadow: 0 20px 20px rgba(102, 126, 234, 0.3);
            }
            50% {
                transform: translateY(-30px);
                box-shadow: 0 50px 30px rgba(102, 126, 234, 0.1);
            }
        }

        /* 4. 双阴影加载器 */
        .loader-double {
            width: 50px;
            height: 50px;
            background: transparent;
            border: 4px solid #667eea;
            border-radius: 50%;
            animation: double-shadow 1.2s linear infinite;
        }

        @keyframes double-shadow {
            0% {
                box-shadow: inset 0 0 0 8px rgba(102, 126, 234, 0.3),
                            0 0 0 0 rgba(118, 75, 162, 0.3);
                transform: rotate(0deg);
            }
            50% {
                box-shadow: inset 0 0 0 4px rgba(102, 126, 234, 0.6),
                            0 0 0 20px rgba(118, 75, 162, 0.1);
                transform: rotate(180deg);
            }
            100% {
                box-shadow: inset 0 0 0 8px rgba(102, 126, 234, 0.3),
                            0 0 0 0 rgba(118, 75, 162, 0.3);
                transform: rotate(360deg);
            }
        }

        /* 5. 呼吸阴影加载器 */
        .loader-breathe {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            animation: breathe-shadow 2s ease-in-out infinite;
        }

        @keyframes breathe-shadow {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.8),
                            0 0 0 10px rgba(102, 126, 234, 0.4),
                            0 0 0 20px rgba(102, 126, 234, 0.2);
            }
            50% {
                transform: scale(0.8);
                box-shadow: 0 0 0 20px rgba(102, 126, 234, 0),
                            0 0 0 40px rgba(102, 126, 234, 0),
                            0 0 0 60px rgba(102, 126, 234, 0);
            }
        }

        /* 6. 圆点阴影加载器 */
        .loader-dots {
            display: flex;
            gap: 10px;
        }

        .loader-dots .dot {
            width: 15px;
            height: 15px;
            background: #667eea;
            border-radius: 50%;
            animation: dot-shadow 1.4s ease-in-out infinite both;
        }

        .loader-dots .dot:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dot-shadow {
            0%, 80%, 100% {
                transform: scale(0.8);
                box-shadow: 0 5px 10px rgba(102, 126, 234, 0.2);
            }
            40% {
                transform: scale(1.2);
                box-shadow: 0 10px 20px rgba(102, 126, 234, 0.5);
            }
        }

        /* 7. 霓虹阴影加载器 */
        .loader-neon {
            width: 60px;
            height: 60px;
            background: transparent;
            border: 3px solid #667eea;
            border-radius: 50%;
            animation: neon-shadow 1.5s ease-in-out infinite alternate;
        }

        @keyframes neon-shadow {
            0% {
                box-shadow: 0 0 5px #667eea,
                            0 0 10px #667eea,
                            0 0 20px #667eea,
                            0 0 40px #764ba2,
                            0 0 80px #764ba2,
                            inset 0 0 5px #667eea;
            }
            100% {
                box-shadow: 0 0 10px #667eea,
                            0 0 20px #667eea,
                            0 0 40px #764ba2,
                            0 0 80px #764ba2,
                            0 0 120px #764ba2,
                            inset 0 0 10px #667eea;
            }
        }

        /* 8. 条形阴影加载器 */
        .loader-bars {
            display: flex;
            gap: 5px;
            height: 50px;
        }

        .loader-bars .bar {
            width: 10px;
            height: 100%;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 5px;
            animation: bar-shadow 1.2s ease-in-out infinite;
        }

        .loader-bars .bar:nth-child(1) { animation-delay: 0s; }
        .loader-bars .bar:nth-child(2) { animation-delay: 0.1s; }
        .loader-bars .bar:nth-child(3) { animation-delay: 0.2s; }
        .loader-bars .bar:nth-child(4) { animation-delay: 0.3s; }
        .loader-bars .bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes bar-shadow {
            0%, 40%, 100% {
                transform: scaleY(0.4);
                box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
            }
            20% {
                transform: scaleY(1);
                box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">Project A3 iFly</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">返回首页</a>
                <a class="nav-link" href="/parallax">视差滚动</a>
                <a class="nav-link" href="/video-bg">视频背景</a>
                <a class="nav-link" href="/scroll-transitions">滚动转换</a>
                <a class="nav-link" href="/fullscreen-nav">全屏导航</a>
                <a class="nav-link" href="/shadow-loader">阴影加载</a>
                <a class="nav-link" href="/reverse-hover">反向悬停</a>
                <a class="nav-link" href="/text-align-center">文本居中</a>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section class="hero-section">
        <div class="container">
            <h1 class="display-2 fw-bold">Box Shadow 加载动画效果</h1>
            <p class="lead mt-4">多种优雅的阴影加载动画效果展示</p>
        </div>
    </section>

    <!-- 加载动画展示 -->
    <section class="content-section">
        <div class="container">
            <h2 class="text-center mb-5">加载动画效果集合</h2>
            <div class="row g-4">
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-pulse"></div>
                        </div>
                        <h4 class="mt-4">脉冲阴影</h4>
                        <p class="text-muted small">柔和的脉冲扩散效果</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-rotate"></div>
                        </div>
                        <h4 class="mt-4">旋转阴影</h4>
                        <p class="text-muted small">动态的旋转阴影变化</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-bounce"></div>
                        </div>
                        <h4 class="mt-4">弹跳阴影</h4>
                        <p class="text-muted small">活泼的弹跳运动效果</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-double"></div>
                        </div>
                        <h4 class="mt-4">双阴影</h4>
                        <p class="text-muted small">内外双层阴影效果</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-breathe"></div>
                        </div>
                        <h4 class="mt-4">呼吸阴影</h4>
                        <p class="text-muted small">多层阴影呼吸效果</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-dots">
                                <div class="dot"></div>
                                <div class="dot"></div>
                                <div class="dot"></div>
                            </div>
                        </div>
                        <h4 class="mt-4">圆点阴影</h4>
                        <p class="text-muted small">三个圆点的跳跃动画</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-neon"></div>
                        </div>
                        <h4 class="mt-4">霓虹阴影</h4>
                        <p class="text-muted small">炫目的霓虹发光效果</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="loader-card">
                        <div class="loader-container">
                            <div class="loader-bars">
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                                <div class="bar"></div>
                            </div>
                        </div>
                        <h4 class="mt-4">条形阴影</h4>
                        <p class="text-muted small">音乐条式的波动效果</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
