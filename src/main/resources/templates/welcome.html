<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>欢迎加入 - Project A3 iFly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .welcome-card { max-width: 600px; margin: auto; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; text-align: center; }
        .btn-primary { padding: 12px 30px; font-weight: 600; border-radius: 30px; }
    </style>
</head>
<body>
    <div class="welcome-card">
        <h1 class="display-4 mb-4">👋 欢迎回来, <span th:text="${user.username}"></span>!</h1>
        <p class="lead mb-4" th:if="${user.firstLogin}">很高兴见到你，这是你首次注册/登陆我们的系统。</p>
        <p class="lead mb-4" th:unless="${user.firstLogin}">欢迎再次使用 Project A3 iFly。</p>
        <div class="mt-4">
            <a href="/" class="btn btn-primary">进入系统</a>
        </div>
    </div>
</body>
</html>
